name: forescout-connect-demo

services:
  mongodb:
    image: mongo:4.4
    container_name: forescout_demo_mongodb
    restart: unless-stopped
    volumes:
      - forescout_demo_mongo_data:/data/db
    networks:
      - forescout_demo_net
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: ./backend
    container_name: forescout_demo_api
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: forescout_connect_demo
      JWT_SECRET: ${JWT_SECRET:-forescout-connect-demo-change-me}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS:-3600}
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - forescout_demo_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: forescout_demo_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_SSL_PORT:-8443}:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - forescout_demo_net

volumes:
  forescout_demo_mongo_data:
    name: forescout_demo_mongo_data

networks:
  forescout_demo_net:
    name: forescout_demo_net
